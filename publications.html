<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Publications | Walckense Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfcfc;
            scroll-behavior: smooth;
        }

        .filter-active {
            background-color: #0f172a !important;
            color: white !important;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.2);
        }
    </style>
</head>

<body class="antialiased">

    <header class="bg-white/95 border-b border-slate-100 sticky top-0 z-100 backdrop-blur-md">
        <nav class="max-w-7xl mx-auto flex justify-between items-center py-5 px-6 md:px-12">

            <a href="./index.html" class="flex items-center gap-3 group">
                <div
                    class="w-10 h-10 bg-slate-900 rounded-lg flex items-center justify-center text-white font-bold text-xl group-hover:bg-amber-600 transition-all shadow-lg shadow-slate-200 overflow-hidden">
                    <img src="./assets/logos/logo.jpeg" alt="Logo" class="object-cover w-full h-full">
                </div>
                <div class="flex flex-col">
                    <span class="font-extrabold uppercase tracking-tighter text-slate-900 leading-none text-lg">
                        Walckense <span class="text-amber-600">Engineering</span>
                    </span>
                    <span class="text-[9px] uppercase tracking-[0.3em] text-slate-400 font-bold">Research Hub</span>
                </div>
            </a>

            <div class="flex items-center">
                <a href="./index.html"
                    class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-amber-600 transition-all rounded-full hover:bg-amber-50"
                    title="Home">
                    <i class="fas fa-home text-xl"></i>
                </a>
            </div>
        </nav>
    </header>

    <section class="py-10 bg-white border-b border-slate-50">
        <div class="max-w-7xl mx-auto px-6 md:px-12 text-center md:text-left">
            <div class="inline-block px-4 py-1.5 mb-6 bg-amber-50 border border-amber-100 rounded-full">
                <span class="text-[10px] font-black uppercase tracking-[0.2em] text-amber-700">Knowledge &
                    Insights</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-6">Technical Publications
            </h1>
            <p class="text-slate-500 max-w-2xl text-lg leading-relaxed">
                Peer-reviewed reports, project whitepapers, and operational intelligence regarding infrastructure
                development across emerging economies.
            </p>
        </div>
    </section>

    <section class="py-6 bg-slate-50/80 sticky top-20.25 z-40 backdrop-blur-md border-b border-slate-100">
        <div class="max-w-7xl mx-auto px-6 md:px-12 flex flex-wrap items-center gap-3">
            <button id="filter-all"
                class="filter-active px-6 py-2.5 bg-white text-slate-500 text-[11px] font-bold uppercase tracking-widest rounded-full border border-slate-200 transition-all">All
                Articles</button>
            <button id="filter-recent"
                class="px-6 py-2.5 bg-white text-slate-500 text-[11px] font-bold uppercase tracking-widest rounded-full border border-slate-200 transition-all hover:border-slate-400 hover:text-slate-900">Recently
                Added</button>
            <button id="filter-popular"
                class="px-6 py-2.5 bg-white text-slate-500 text-[11px] font-bold uppercase tracking-widest rounded-full border border-slate-200 transition-all hover:border-slate-400 hover:text-slate-900">Most
                Read</button>
        </div>
    </section>

    <main class="max-w-7xl mx-auto px-6 md:px-12 py-10 min-h-screen">
        <div id="articleGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </main>

    <footer class="bg-white border-t border-slate-100 py-16 text-center">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-slate-400 text-sm font-medium tracking-wide">
                &copy; 2026 Walckense Engineering Services. BN-3777499. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="./js/publications.js"></script>
    <script src="./js/cache.js"></script>
</body>
</html>
